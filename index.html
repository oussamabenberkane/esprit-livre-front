      ],

    },
    {

      "@id": "https://espritlivre.com/#website",
      "name": "Esprit Livre",
      "url": "https://espritlivre.com",
      "inLanguage": "fr-DZ",
      "publisher": {
        "@id": "https://espritlivre.com/#organization"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Quels sont les délais de livraison ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Les délais de livraison varient entre 1 à 4 jours ouvrables selon votre wilaya. Les commandes sont traitées le jour même si passées avant 14h."
      }
    },
    {
      "@type": "Question",
      "name": "La livraison est-elle gratuite ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "La livraison est gratuite pour toute commande supérieure à 7000 DA. En dessous de ce montant, des frais de livraison s'appliquent selon votre wilaya."
      }
    },
    {
      "@type": "Question",
      "name": "Quels sont les modes de paiement acceptés ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Nous acceptons le paiement à la livraison (cash), ainsi que les cartes CIB et el-dhahabia."
      }
    },
    {
      "@type": "Question",
      "name": "Comment retourner un livre ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Les retours sont acceptés dans un délai de 3 jours après réception, à condition que le livre soit en parfait état et dans son emballage d'origine. Contactez-nous à contact@espritlivre.com pour initier un retour."
      }
    },
    {
      "@type": "Question",
      "name": "Livrez-vous partout en Algérie ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Oui, nous livrons dans toutes les wilayas d'Algérie, d'Alger à Tamanrasset."
      }
    },
    {
      "@type": "Question",
      "name": "Comment suivre ma commande ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Vous pouvez suivre votre commande depuis votre espace personnel dans la section 'Mes commandes'. Un email de confirmation vous est envoyé à chaque étape."
      }
    },
    {
      "@type": "Question",
      "name": "Proposez-vous des livres en arabe ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Oui, notre catalogue comprend des livres en français et en arabe, couvrant de nombreuses catégories : romans, développement personnel, jeunesse, sciences et plus."
      }
    }
  ]
}
    </script>
